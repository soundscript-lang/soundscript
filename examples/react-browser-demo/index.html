<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soundscript React Browser Demo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23145a46'/%3E%3Cpath d='M16 32c7-11 25-17 34-9 6 5 5 15-3 20-9 6-22 5-31-1' fill='none' stroke='%23fff4dc' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E"
    >
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.2.4",
          "react/jsx-runtime": "https://esm.sh/react@19.2.4/jsx-runtime",
          "react-dom/client": "https://esm.sh/react-dom@19.2.4/client?deps=react@19.2.4"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, #fff4dc 0, #fff4dc 14rem, transparent 28rem),
          linear-gradient(180deg, #f8f1e1 0%, #efe5d1 100%);
        color: #1f1911;
      }

      main {
        box-sizing: border-box;
        max-width: 48rem;
        margin: 0 auto;
        padding: 3rem 1.5rem 4rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        max-width: 38rem;
        font-size: 1.05rem;
        line-height: 1.5;
      }

      .panel {
        margin-top: 2rem;
        padding: 1.5rem;
        border: 1px solid rgba(50, 36, 21, 0.16);
        border-radius: 1rem;
        background: rgba(255, 250, 241, 0.88);
        box-shadow: 0 20px 60px rgba(74, 53, 31, 0.08);
      }

      #app button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 0.95rem 1.35rem;
        background: linear-gradient(135deg, #1d7d61 0%, #145946 100%);
        color: #f7f4ed;
        font: inherit;
        font-size: 1rem;
        cursor: pointer;
      }

      #app button:hover {
        filter: brightness(1.05);
      }

      #app p {
        margin-top: 1rem;
        font-family: ui-monospace, 'SFMono-Regular', 'SF Mono', Consolas, monospace;
        font-size: 0.95rem;
      }

      code {
        font-family: ui-monospace, 'SFMono-Regular', 'SF Mono', Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>React From Soundscript</h1>
      <p>
        The button below is created inside a <code>.sts</code> file, compiled to Wasm, and mounted
        through the generated browser wrapper.
      </p>
      <section class="panel">
        <div id="app"></div>
      </section>
    </main>
    <script type="module" src="./src/bootstrap.js"></script>
  </body>
</html>
